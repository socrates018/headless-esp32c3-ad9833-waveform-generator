<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AD9833 Controller</title>
<style>
  body{font-family:Arial, sans-serif;margin:24px;max-width:520px;width:calc(100% - 48px)}
  .row{margin:16px 0}
  label{display:block;margin-bottom:8px;font-weight:600}
  input,select,button{font-size:18px;padding:10px;width:100%;box-sizing:border-box}
  button{cursor:pointer}
  .status{margin-top:16px;color:#0a7}
  .radio-group{display:flex;gap:12px;flex-wrap:wrap}
  .radio-card{
    display:flex;align-items:center;gap:10px;
    padding:12px 14px;border:2px solid #ddd;border-radius:10px;
    font-size:18px;cursor:pointer;user-select:none
  }
  .radio-card input{transform:scale(1.4)}
  .row-inline{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  .row-inline > *{flex:1;min-width:160px}
  .row-inline.gap-top{margin-top:12px}
  .radio-inline{display:flex;gap:10px;flex-wrap:wrap}
  .radio-inline .radio-card{padding:8px 10px;font-size:16px}
  .freq-input{margin-bottom:12px}
  .note{margin-top:8px;font-size:14px}
  .note.info{color:#555}
  .note.warn{color:#b35c00}
  @media (max-width:520px){
    body{margin:16px;max-width:100%;width:calc(100% - 32px)}
    .row-inline > *{min-width:100%}
    .radio-group,.radio-inline{gap:8px}
  }
</style>
</head>
<body>
<h2>AD9833 Waveform Control</h2>
<div class="row">
  <label>Frequency</label>
  <div class="row-inline">
    <input id="freqValue" class="freq-input" type="number" min="0" step="1" value="1" />
  </div>
  <div class="radio-inline">
    <label class="radio-card">
      <input type="radio" name="mult" value="1" checked /> Hz
    </label>
    <label class="radio-card">
      <input type="radio" name="mult" value="1000" /> kHz
    </label>
    <label class="radio-card">
      <input type="radio" name="mult" value="1000000" /> MHz
    </label>
  </div>
</div>
<div class="row">
  <label>Waveform</label>
  <div class="radio-group">
    <label class="radio-card">
      <input type="radio" name="wave" value="sine" checked /> Sine
    </label>
    <label class="radio-card">
      <input type="radio" name="wave" value="triangle" /> Triangle
    </label>
    <label class="radio-card">
      <input type="radio" name="wave" value="square" /> Square
    </label>
  </div>
  <div id="waveWarn" class="note info"></div>
</div>
<div class="row">
  <label>Output</label>
  <button id="outputBtn">Output: ON</button>
</div>
<div class="row">
  <label>Phase Shift (°)</label>
  <div class="row-inline">
    <input id="phaseValue" type="number" min="0" max="360" step="1" value="0" />
    <input id="phaseRange" type="range" min="0" max="360" step="1" value="0" />
  </div>
</div>
<div class="row">
  <label>Frequency Sweep</label>
  <div class="row-inline">
    <div>
      <label>Start (Hz)</label>
      <input id="sweepStart" type="number" min="0" step="1" value="1000" />
    </div>
    <div>
      <label>Stop (Hz)</label>
      <input id="sweepStop" type="number" min="0" step="1" value="10000" />
    </div>
    <div>
      <label>Duration (ms)</label>
      <input id="sweepDur" type="number" min="1" step="1" value="1000" />
    </div>
  </div>
  <div class="row-inline gap-top">
    <button id="sweepBtn">Start Sweep</button>
  </div>
</div>
<div id="status" class="status"></div>
<script>
const statusEl = document.getElementById('status');
const waveWarnEl = document.getElementById('waveWarn');
const outputBtn = document.getElementById('outputBtn');
const phaseValueEl = document.getElementById('phaseValue');
const phaseRangeEl = document.getElementById('phaseRange');
const sweepBtn = document.getElementById('sweepBtn');

function getWave() {
  const selected = document.querySelector('input[name="wave"]:checked');
  return selected ? selected.value : 'sine';
}

function getMult() {
  const selected = document.querySelector('input[name="mult"]:checked');
  return selected ? Number(selected.value) : 1;
}

function updateWaveWarning() {
  const wave = getWave();
  if (wave === 'square') {
    waveWarnEl.textContent = '⚠️ Output: 3.3V/5V Logic';
    waveWarnEl.className = 'note warn';
  } else {
    waveWarnEl.textContent = 'ℹ️ Output: ~0.6V';
    waveWarnEl.className = 'note info';
  }
}

let applyTimer = null;
async function applySettings() {
  const value = Number(document.getElementById('freqValue').value || 0);
  const mult = getMult();
  const freq = value * mult;
  const wave = getWave();
  const res = await fetch(`/set?freq=${encodeURIComponent(freq)}&wave=${encodeURIComponent(wave)}`);
  const text = await res.text();
  statusEl.textContent = text;
}

function scheduleApply() {
  if (applyTimer) clearTimeout(applyTimer);
  applyTimer = setTimeout(applySettings, 150);
}

let outputEnabled = true;
function updateOutputButton() {
  outputBtn.textContent = outputEnabled ? 'Output: ON' : 'Output: OFF';
}

async function toggleOutput() {
  outputEnabled = !outputEnabled;
  updateOutputButton();
  const res = await fetch(`/output?state=${outputEnabled ? 1 : 0}`);
  const text = await res.text();
  statusEl.textContent = text;
}

let phaseTimer = null;
async function applyPhase() {
  const deg = Number(phaseValueEl.value || 0);
  const res = await fetch(`/phase?deg=${encodeURIComponent(deg)}`);
  const text = await res.text();
  statusEl.textContent = text;
}

function schedulePhaseApply() {
  if (phaseTimer) clearTimeout(phaseTimer);
  phaseTimer = setTimeout(applyPhase, 150);
}

async function startSweep() {
  const start = Number(document.getElementById('sweepStart').value || 0);
  const stop = Number(document.getElementById('sweepStop').value || 0);
  const dur = Number(document.getElementById('sweepDur').value || 0);
  const res = await fetch(`/sweep?start=${encodeURIComponent(start)}&stop=${encodeURIComponent(stop)}&dur=${encodeURIComponent(dur)}`);
  const text = await res.text();
  statusEl.textContent = text;
}


document.getElementById('freqValue').addEventListener('input', scheduleApply);
document.querySelectorAll('input[name="mult"]').forEach(r => r.addEventListener('change', scheduleApply));
document.querySelectorAll('input[name="wave"]').forEach(r => r.addEventListener('change', () => {
  updateWaveWarning();
  scheduleApply();
}));
outputBtn.addEventListener('click', toggleOutput);
phaseValueEl.addEventListener('input', () => {
  const v = Number(phaseValueEl.value || 0);
  phaseRangeEl.value = v;
  schedulePhaseApply();
});
phaseRangeEl.addEventListener('input', () => {
  const v = Number(phaseRangeEl.value || 0);
  phaseValueEl.value = v;
  schedulePhaseApply();
});
sweepBtn.addEventListener('click', startSweep);

updateWaveWarning();
updateOutputButton();
</script>
</body>
</html>
